<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login UI Nithin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center/cover;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    color: white;
}

.navbar .menu a {
    margin: 0 15px;
    text-decoration: none;
    color: white;
}

.login-btn {
    border: 1px solid white;
    padding: 5px 15px;
    cursor: pointer;
}

/* Center Modal */
.container {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass effect box */
.login-box {
    width: 300px;
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
}

/* Close button */
.close {
    position: absolute;
    top: 10px;
    right: 15px;
    cursor: pointer;
}

/* Inputs */
.input-group {
    margin: 15px 0;
    text-align: left;
}

.input-group input {
    width: 100%;
    border: none;
    border-bottom: 1px solid black;
    background: transparent;
    padding: 5px;
    outline: none;
}

/* Options */
.options {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: none;
    background: #0d1b2a;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* Footer text */
.footer {
    font-size: 12px;
    margin-top: 10px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Logo</div>
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>
    <div class="login-btn">Login</div>
</div>

<!-- Login Box -->
<div class="container">
    <div class="login-box">

        <div class="close">✖</div>

        <h2>Login</h2>

        <div class="input-group">
            <label>Email</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password">
        </div>

        <div class="options">
            <div>
                <input type="checkbox"> Remember me
            </div>
            <div>Forgot Password?</div>
        </div>

        <button>Login</button>

        <div class="footer">
            Don't have an account? <b>Register</b>
        </div>

    </div>
</div>

</body>
</html>
